<!-- Material Symbols link (should ideally be global, but kept here for toggle specific icons) -->
<link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

<div class="ft-toggle-field-container" [class]="size + ' ' + state + ' ' + variant + ' pos-' + labelPosition"
    [class.select]="value" [class.inactive]="disabled || state === 'disabled'" [class.invalid]="invalid"
    (click)="toggle()">

    <!-- THE LABEL/CONTENT AREA IS NOW A CORE FLEX ITEM -->
    <div class="content" *ngIf="isLabel || isDescription" [ngClass]="{
           'content-xs--normal': size === 'sm-size',
           'content-sm--normal': size === 'md-size',
           'content-md--normal': size === 'lg-size'
         }">
        <div *ngIf="isLabel" class="label">{{label}}</div>
        <div *ngIf="isDescription" class="description">{{description}}</div>
    </div>

    <!-- THE TOGGLE SWITCH IS THE OTHER CORE FLEX ITEM -->
    <div class="field">
        <div class="toggle" [class.label]="variant === 'label'">
            <!-- Internal Track Labels for Binary variant -->
            <div *ngIf="variant === 'label'" class="track-label">
                <span class="on-label">{{onLabel}}</span>
                <span class="off-label">{{offLabel}}</span>
            </div>

            <div class="thumb">
                <!-- Icon for Icon variant -->
                <span *ngIf="variant === 'icon'" class="material-symbols-rounded icon">
                    {{value ? onIcon : offIcon}}
                </span>
            </div>
        </div>
    </div>

</div>
