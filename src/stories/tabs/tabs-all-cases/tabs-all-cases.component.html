<div class="all-case-container">
    <h1 class="showcase-title">Tabs All cases</h1>
    <div class="cases-container">
        <!-- Header Row -->
        <div class="case-row case-row-heading">
            <div class="case-item case-item-heading"></div>
            <div class="case-item heading-text">Component</div>
        </div>

        <!-- Body Rows: States -->
        @for (state of states; track state) {
        <div class="case-row">
            <div class="case-item case-item-heading vertical-text">
                {{ state }}
            </div>
            <div class="case-item">
                <ft-tabs [tabs]="tabsToDisplay" [variant]="variant" [size]="size" [color]="color" [radius]="radius"
                    [(activeTabValue)]="activeTab1" [state]="state">
                </ft-tabs>
            </div>
        </div>
        }
    </div>

    <!-- Content Panels Section -->
    <h2 class="showcase-title mt-8">Tabs with Content Panels</h2>
    <div class="cases-container">
        <div class="case-row case-row-heading">
            <div class="case-item case-item-heading"></div>
            <div class="case-item heading-text">Dynamic Projection</div>
        </div>
        <div class="case-row">
            <div class="case-item case-item-heading vertical-text">
                <p>Default</p>
            </div>
            <div class="case-item align-start">
                <ft-tabs [(activeTabValue)]="activeTab1" [variant]="variant" [color]="color" [size]="size"
                    [radius]="radius">
                    <ft-tab label="Patient Info" value="consultation" icon="person">
                        <div class="text-sm font-medium">Hello there, this is the patient information tab showcasing
                            content.</div>
                    </ft-tab>
                    <ft-tab label="Vitals" value="prescription" icon="monitor_heart">
                        <div class="text-sm">Patient's vital metrics over the last 24 hours. Normal.</div>
                    </ft-tab>
                    <ft-tab label="Notes" value="cerficat" icon="edit_note">
                        <div class="text-sm text-gray-500 italic">No notes found for this visit.</div>
                    </ft-tab>
                </ft-tabs>
            </div>
        </div>
    </div>
</div>
