<div class="field-container"
     [class]="size + ' ' + state"
     [class.select]="select"
     [class.inactive]="inactive"
     [class.invalid]="invalid"
>
  <div class="field"

  >
    <div
      class="radio"
    >
      <div class="control"></div>
    </div>

  </div>
  <div class="content content-xs--normal">
    <div *ngIf="isLabel" class="label">
      {{label}}
    </div>
    <div *ngIf="isDescription" class="description">
      {{description}}
    </div>
  </div>

</div>
