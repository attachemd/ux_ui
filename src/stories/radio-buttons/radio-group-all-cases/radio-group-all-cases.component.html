<div class="all-case-container">
    <h1 class="showcase-title">Radio Group All Cases</h1>

    <div class="section">
        <h2 class="section-title">Orientations & Default</h2>
        <div class="cases-grid">
            <div class="case">
                <p class="case-label">Column (Vertical)</p>
                <ft-radio-group [isLabel]="true" label="Vertical Group" [isDescription]="true"
                    description="This is a vertical radio group." [options]="defaultOptions" flexDirection="flex-col">
                </ft-radio-group>
            </div>
            <div class="case">
                <p class="case-label">Row (Horizontal)</p>
                <ft-radio-group [isLabel]="true" label="Horizontal Group" [isDescription]="true"
                    description="This is a horizontal radio group." [options]="defaultOptions" flexDirection="flex-row">
                </ft-radio-group>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">States</h2>
        <div class="cases-grid">
            <div class="case">
                <p class="case-label">Invalid State</p>
                <ft-radio-group [isLabel]="true" label="Invalid Group" [invalid]="true"
                    errorMessage="This field is required." [options]="defaultOptions">
                </ft-radio-group>
            </div>
            <div class="case">
                <p class="case-label">Inactive State</p>
                <ft-radio-group [isLabel]="true" label="Inactive Group" [inactive]="true" [options]="defaultOptions">
                </ft-radio-group>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">Sizes</h2>
        <div class="sizes-row">
            @for (size of sizes; track size) {
            <div class="case">
                <p class="case-label">{{size}}</p>
                <ft-radio-group [isLabel]="true" [label]="size" [size]="size" [options]="defaultOptions">
                </ft-radio-group>
            </div>
            }
        </div>
    </div>
</div>
