<div class="button-dropdown-container" [class]="size + ' ' + variant + ' ' + state + ' ' + color" [class.is-open]="isOpen" [class.is-split]="isSplit">
    
    <!-- Split Button: Main Part -->
    @if (isSplit) {
        <button class="button-wrapper main-button" [class]="radiusClasses" (click)="onMainButtonClick($event)" [disabled]="disabled || state === 'disabled'">
            @if (isPrefixIconClass && prefixIconClass) {
                <div class="prefix-icon">
                    <span class="material-symbols-rounded">{{prefixIconClass}}</span>
                </div>
            }
            <div class="content-section">
                <div class="label-row">
                    <span class="label" [ngClass]="{
                        'content-3xs--bold': size === 'xs-size',
                        'content-2xs--bold': size === 'sm-size',
                        'content-xs--bold': size === 'md-size',
                        'content-sm--bold': size === 'lg-size'
                    }">{{ label }}</span>
                </div>
            </div>
        </button>

        <!-- Split Button: Dropdown Trigger -->
        <button class="button-wrapper dropdown-trigger" [class]="radiusClasses" (click)="toggleDropdown($event)" [disabled]="disabled || state === 'disabled'">
            <div class="suffix-icon">
                <span class="material-symbols-rounded" [class.rotated]="isOpen">{{suffixIconClass}}</span>
            </div>
        </button>
    } @else {
        <!-- Regular Button Dropdown -->
        <button class="button-wrapper single-button" [class]="radiusClasses" (click)="onMainButtonClick($event)" [disabled]="disabled || state === 'disabled'">
            @if (isPrefixIconClass && prefixIconClass) {
                <div class="prefix-icon">
                    <span class="material-symbols-rounded">{{prefixIconClass}}</span>
                </div>
            }
            <div class="content-section">
                <div class="label-row">
                    <span class="label" [ngClass]="{
                        'content-3xs--bold': size === 'xs-size',
                        'content-2xs--bold': size === 'sm-size',
                        'content-xs--bold': size === 'md-size',
                        'content-sm--bold': size === 'lg-size'
                    }">{{ label }}</span>
                </div>
            </div>
            @if (isSuffixIconClass && suffixIconClass) {
                <div class="suffix-icon">
                    <span class="material-symbols-rounded" [class.rotated]="isOpen">{{suffixIconClass}}</span>
                </div>
            }
        </button>
    }

    <!-- Dropdown Menu -->
    @if (isOpen) {
        <div class="dropdown-menu" (click)="$event.stopPropagation()">
            <ul class="options-list">
                @for (opt of options; track opt) {
                    <li class="option-item" [class.disabled]="opt.disabled" (click)="selectOption(opt, $event)">
                        @if (opt.icon) {
                            <span class="material-symbols-rounded option-icon">{{ opt.icon }}</span>
                        }
                        <span class="option-label">{{ opt.label }}</span>
                    </li>
                }
                @if (options.length === 0) {
                    <li class="option-item no-options">No options available</li>
                }
            </ul>
        </div>
    }
</div>
