<div class="button-container"
     [class]="size + ' ' + variant + ' ' + state + ' ' + color"
>
  <div class="button-wrapper" [class]="radiusClasses">
    <div *ngIf="isPrefixIconClass && prefixIconClass" class="prefix">
      <i [class]="prefixIconClass"></i>
    </div>
    <div class="content-section">
      <div *ngIf="isLabel" class="label-row">
        <span class="label truncate"
              [ngClass]="{
           'content-xs--bold': size === 'sm-size' || size === 'md-size' || size === 'xs-size',
           'content-sm--bold': size === 'lg-size',
           }"
        >{{ label }}</span>
      </div>

    </div>
    <div *ngIf="isSuffixIconClass && suffixIconClass" class="suffix-icon flex">
      <div class="suffix1">
        <i [class]="suffixIconClass"></i>
      </div>
    </div>
  </div>
</div>
