<div class="all-case-container">
    <h1 class="showcase-title">Button Dropdown All Cases</h1>
    <div class="cases-container">
        <div class="case-row case-row-heading">
            <div class="case-item case-item-heading"></div>
            @for (variant of variants; track variant) {
                <div class="case-item text-capitalize">
                    {{ variant }}
                </div>
            }
        </div>
        
        @for (state of states; track state) {
            <div class="case-row">
                <div class="case-item case-item-heading vertical-text text-capitalize">
                    {{ state }}
                </div>
                @for (variant of variants; track variant) {
                    <div class="case-item">
                        <ft-button-dropdown
                            [label]="isIconOnly ? undefined : 'Dropdown'"
                            [size]="size"
                            [color]="color"
                            [variant]="variant"
                            [radius]="radius"
                            [state]="state"
                            [isSplit]="isSplit"
                            [isIconOnly]="isIconOnly"
                            [isPrefixIconClass]="true"
                            [prefixIconClass]="isIconOnly ? 'more_vert' : 'settings'"
                            [options]="options">
                        </ft-button-dropdown>
                    </div>
                }
            </div>
        }
    </div>
</div>
