<div class="group-field-container">
  <div class="group-field-label content-xs--normal">
    {{label}}
  </div>
  <div class="group-field-content-container">
    <div class="group-field-content"
         [ngClass]="flexDirection"
    >
      <ft-radio
        *ngFor="let option of options"
        [isLabel]="option.isLabel"
        [label]="option.label"
        [isDescription]="isDescription ?? option.isDescription"
        [description]="option.description"
        [size]="option.size || size"
        [state]="option.state || 'rest'"
        [invalid]="invalid || option.invalid || false"
        [select]="option.select !== undefined ? option.select : true"
        [inactive]="option.inactive !== undefined ? option.inactive : false"
      >
      </ft-radio>
    </div>
    <div *ngIf="invalid && errorMessage" class="error-message">
      <p class="error-text content-2xs--normal">{{ errorMessage }}</p>
    </div>
    <div *ngIf="description && !invalid" class="description">
      <p class="highlight content-2xs--normal">{{ description }}</p>
    </div>
  </div>

</div>
