<form [formGroup]="treatmentForm">
  <div class="dialog-form-body-container">
    <div class="dialog-form-body">

      <div class="field-container field-group-row spacer-mb-4">
        <label class="text-sm-medium">Type de saisie</label>
        <ft-switch-button
          [options]="entryTypes"
          [selectedId]="treatmentForm.get('entryType')?.value"
          (selectionChange)="treatmentForm.get('entryType')?.setValue($event)"
          size="sm-size"
        ></ft-switch-button>
      </div>

      <div class="form-group dialog-form-row two-cols">
        <div class="field-container">
          <ft-input
            [label]="treatmentNameLabel"
            [required]="true"
            formControlName="treatmentName"
            variant="flat"
            placeholder="Ex. Paracétamol"
          ></ft-input>
        </div>

        <div class="field-container">
          <ft-select
            label="Statut"
            formControlName="status"
            [options]="statuses"
            variant="flat"
          ></ft-select>
        </div>
      </div>

      <div class="form-group dialog-form-row two-cols spacer-mt-4">
        <div class="field-container">
          <ft-input
            label="Date de début"
            formControlName="startDate"
            type="date"
            variant="flat"
          ></ft-input>
          @if (shouldShowError(treatmentForm) && treatmentForm.errors?.['dateRangeInvalid']) {
            <small class="error-text">
              La date de début doit être antérieure à la date de fin.
            </small>
          }
        </div>

        <div class="field-container">
          <ft-input
            label="Date de fin"
            formControlName="endDate"
            type="date"
            variant="flat"
          ></ft-input>
          @if (shouldShowError(treatmentForm) && treatmentForm.errors?.['dateRangeInvalid']) {
            <small class="error-text">
              La date de fin doit être postérieure à la date de début.
            </small>
          }
        </div>
      </div>

      <div class="form-group dialog-form-row three-cols spacer-mt-4">
        <div class="field-container">
          <ft-input label="Posologie" formControlName="dosage" variant="flat" [isClearable]="true"></ft-input>
        </div>

        <div class="field-container">
          <ft-input label="Indication" formControlName="indication" variant="flat" [isClearable]="true"></ft-input>
        </div>

        <div class="field-container">
          <ft-input label="Prescripteur" formControlName="prescriber" variant="flat" [isClearable]="true"></ft-input>
        </div>
      </div>

      <div class="field-container spacer-mt-4">
        <ft-input
          label="Note"
          formControlName="note"
          type="textarea"
          variant="flat"
          [isClearable]="true"
        ></ft-input>
      </div>

    </div>
  </div>

  <div class="dialog-footer">
    <ft-button
      label="Annuler"
      variant="ghost"
      (click)="closeDialog()"
      size="sm-size"
    ></ft-button>
    <ft-button
      label="Enregistrer"
      variant="flat"
      color="primary"
      (click)="saveTreatment()"
      size="sm-size"
      [state]="!treatmentForm.valid ? 'disabled' : 'rest'"
    ></ft-button>
  </div>
</form>
