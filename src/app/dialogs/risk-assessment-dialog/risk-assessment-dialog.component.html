<form [formGroup]="riskFactorForm">
  <div class="dialog-form-body-container">
    <div class="dialog-form-body">

      <div class="form-group">
        <div class="field-container lg:min-w-[200px] lg:w-[200px]">
          <p-floatlabel variant="in" class="w-full">
            <p-dropdown
              formControlName="riskCategory"
              [options]="riskCategories"
              optionLabel="name"
              [showClear]="true"
              id="riskCategory"
              styleClass="w-full"
              variant="filled"
              (onChange)="onRiskCategoryChange()"
            />
            <label for="riskCategory">Catégorie de risque</label>
          </p-floatlabel>
        </div>

        <div class="field-container">
          <p-floatlabel variant="in" class="w-full">
            <p-autocomplete
              [required]="true"
              formControlName="riskFactorName"
              [suggestions]="riskFactorSuggestions"
              field="name"
              (completeMethod)="searchRiskFactors($event)"
              (onSelect)="onRiskFactorSelect($event)"
              [showClear]="true"
              class="flex-grow"
              id="riskFactorName"
              variant="filled"
            >
            </p-autocomplete>
            <label
              for="riskFactorName">Facteur de risque {{ (riskCategoryControl?.value ? '(Filtré par ' + riskCategoryControl?.value.name + ') ' : ' ') }}
              <span>*</span></label>
          </p-floatlabel>
          <small
            class="p-error"
            *ngIf="shouldShowError(riskFactorNameControl)"
          >
            <span *ngIf="riskFactorNameControl?.errors?.['required']"
            >Le facteur de risque est obligatoire.</span
            >
          </small>
        </div>
      </div>

      <div class="form-group">
        <div class="field-container">
          <p-floatlabel variant="in" class="w-full">
            <p-datepicker
              formControlName="evaluationDate"
              [showClear]="true"
              id="evaluationDate"
              showIcon
              iconDisplay="input"
              variant="filled"
              dateFormat="dd/mm/yy"
            ></p-datepicker>
            <label for="evaluationDate">Date de l'évaluation</label>
          </p-floatlabel>
        </div>

        <div class="field-container">
          <p-floatlabel variant="in" class="w-full">
            <p-dropdown
              formControlName="riskLevel"
              [options]="riskLevels"
              optionLabel="name"
              [showClear]="true"
              id="riskLevel"
              styleClass="w-full"
              variant="filled"
            />
            <label for="riskLevel">Niveau de risque</label>
          </p-floatlabel>
        </div>
      </div>

      <div class="form-container">
        <p-floatlabel variant="in">
          <div class="p-inputgroup w-full">
              <textarea
                pTextarea
                id="note"
                formControlName="note"
                rows="3"
                cols="30"
                style="resize: none"
                class="w-full"
                variant="filled"
              ></textarea>
            <p-button type="button" pButton icon="pi pi-times" severity="secondary"
                    [rounded]="true"
                    [text]="true"
                    (click)="clearField('note')"
                    *ngIf="noteControl?.value"></p-button>
          </div>
          <label for="note">Note</label>
        </p-floatlabel>
      </div>

    </div>
  </div>

  <div class="flex justify-end gap-2 dialog-footer">
    <p-button
      label="Annuler"
      severity="secondary"
      (click)="closeDialog(null)"
      size="small"
    />
    <p-button label="Enregistrer" (click)="saveRiskFactor()" size="small"
              [disabled]="!riskFactorForm.valid"/>
  </div>
</form>
