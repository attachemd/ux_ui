<div class="body">

  <h2>Risk Level Status</h2>
  <!-- <p class="section-description">
    Visual indicators for patient risk assessment levels, color-coded from
    severe (red) to safe (green).
  </p> -->
  <div class="tag-container">
    <div class="tag risk-critical">CRITICAL</div>
    <div class="tag risk-high">HIGH</div>
    <div class="tag risk-medium">MEDIUM</div>
    <div class="tag risk-low">LOW</div>
  </div>

  <h2>Allergy Severity</h2>
  <!-- <p class="section-description">

  </div>

  </div>
