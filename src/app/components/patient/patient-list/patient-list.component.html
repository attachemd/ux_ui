<div class="list-container ft-panel">
  <div class="list-header">
<!--    <div>-->
<!--      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>-->
<!--    </div>-->
    <mat-form-field class="table-search">
      <mat-icon matPrefix><i class="icon-search"></i></mat-icon>
<!--      <i matPrefix class="icon-close"></i>-->
      <input matInput placeholder="Rechercher les patients" (keyup)="applyFilter($event)" #input />
      <button *ngIf="input.value" matSuffix mat-icon-button aria-label="Clear" (click)="clearInput()">
        <mat-icon><i class="icon-close"></i></mat-icon>
      </button>
    </mat-form-field>
    <div class="table-actions-container">
      <button mat-flat-button class="filter-button">
        <mat-icon><i matSuffix class="icon-filter"></i></mat-icon>
        <span>Filtrer</span>
        <span class="filter-number">2</span>
      </button>
      <button mat-flat-button>
        <mat-icon><i class="icon-plus"></i></mat-icon>
        <span>Nouveau patient</span>
      </button>
      <button mat-icon-button aria-label="Example icon button with a vertical three dot icon">
        <mat-icon><i class="icon-vertical-dots"></i></mat-icon>
      </button>
    </div>
  </div>
  <div class="list-body">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>

        <!-- Checkbox Column -->
        <ng-container matColumnDef="select" sticky>
          <th mat-header-cell *matHeaderCellDef>
            <mat-checkbox (change)="$event ? toggleAllRows() : null"
                          [checked]="selection.hasValue() && isAllSelected()"
                          [indeterminate]="selection.hasValue() && !isAllSelected()"
                          [aria-label]="checkboxLabel()">
            </mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox (click)="$event.stopPropagation()"
                          (change)="$event ? selection.toggle(row) : null"
                          [checked]="selection.isSelected(row)"
                          [aria-label]="checkboxLabel(row)">
            </mat-checkbox>
          </td>
        </ng-container>

        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let row"> {{row.id}} </td>
        </ng-container>

        <!-- Progress Column -->
        <ng-container matColumnDef="progress">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Progress </th>
          <td mat-cell *matCellDef="let row"> {{row.progress}}% </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
          <td mat-cell *matCellDef="let row"> {{row.name}} </td>
        </ng-container>

        <!-- Fruit Column -->
        <ng-container matColumnDef="fruit">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Fruit </th>
          <td mat-cell *matCellDef="let row"> {{row.fruit}} </td>
        </ng-container>

<!--        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>-->
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
        </tr>
      </table>
    </div>

    <mat-paginator
      [pageSize]="25"
      [pageSizeOptions]="[5, 10, 25, 100]"
      showFirstLastButtons
      aria-label="Select page of users"
    ></mat-paginator>
  </div>
</div>
