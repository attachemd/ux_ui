<div class="add-patient-container ft-panel">
  <div class="page-header">
    <div class="header-content-left">
      <h2>Ajouter un nouveau patient</h2>
    </div>
    <div class="header-actions">
      <ft-button label="Annuler" variant="outlined" color="secondary" (click)="cancel()" size="sm-size"></ft-button>
      <ft-button label="Enregistrer" (click)="savePatient()" size="sm-size"
        [state]="(patientForm.invalid || isSaving) ? 'disabled' : 'rest'"></ft-button>
    </div>
  </div>

  <form [formGroup]="patientForm" class="patient-form-wrapper">
    <!-- Header Section: Profile & Status -->
    <div class="form-header-section">
      <div class="profile-container">
        <div class="profile-silhouette">
          <span class="material-symbols-rounded">person</span>
          <ft-icon-button iconClass="edit" size="xs-size" variant="flat" color="primary" class="edit-btn" (click)="onPhotoSelect($event)"></ft-icon-button>
        </div>
      </div>

      <div class="status-segmented-control">
        <ft-button-group formControlName="status" [buttons]="statusOptions" color="tertiary" variant="outlined"
          radius="full-radius" size="sm-size"></ft-button-group>
      </div>
    </div>

    <div class="form-body-container">

      <div class="section-header">
        <h4>Informations Personnelles</h4>
      </div>
      <!-- Row 1 (Personal) -->
      <div class="form-row three-cols civility-row">
        <div class="field-container civility-field">
          <ft-select label="Civilité" formControlName="title" [options]="titles" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Choisir (M, Mme, Mlle...)"></ft-select>
        </div>
        <div class="field-container">
          <ft-input label="Prénom" formControlName="firstName" variant="flat" labelPlacement="label-inside"
            [isLabel]="true" placeholder="Prénom du patient" [required]="true"
            [invalid]="shouldShowError(firstNameControl)" errorMessage="Ce champs n’est pas valide"
            (valueChange)="onValueUppercase('firstName', $event)"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Nom" formControlName="lastName" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            placeholder="Nom de famille" [required]="true" [invalid]="shouldShowError(lastNameControl)"
            errorMessage="Ce champs n’est pas valide" (valueChange)="onValueUppercase('lastName', $event)"></ft-input>
        </div>
      </div>

      <!-- Row 2 (Demographics) -->
      <div class="form-row three-cols">
        <div class="field-container">
          <ft-input label="Date de naissance*" formControlName="dateOfBirth" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Format: JJ/MM/AAAA" [required]="true"
            [invalid]="shouldShowError(dateOfBirthControl)" errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Age" formControlName="age" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            [value]="formattedAge" [readonly]="true"></ft-input>
        </div>
        <div class="field-container">
          <ft-radio-group label="Sexe*" formControlName="sexe" [options]="sexeOptions" [isLabel]="true"
            [flexDirection]="'flex-row'" [invalid]="shouldShowError(sexeControl)"
            errorMessage="Ce champs n’est pas valide"></ft-radio-group>
        </div>
      </div>

<!--      <div class="gradient-divider"></div>-->
      <div class="section-header">
        <h4>Documents & Identification</h4>
      </div>

      <!-- Row 3 (Identity) -->
      <div class="form-row two-cols">
        <div class="field-container">
          <ft-input label="Le numéro national" formControlName="nationalId" variant="flat" labelPlacement="label-inside"
            [isLabel]="true" placeholder="Ex: AB123456" [invalid]="shouldShowError(nationalIdControl)"
            errorMessage="Ce champs n’est pas valide" (valueChange)="onValueUppercase('nationalId', $event)"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Le numéro du passeport" formControlName="passportNumber" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Ex: N1234567"
            [invalid]="shouldShowError(passportNumberControl)" errorMessage="Ce champs n’est pas valide"
            (valueChange)="onValueUppercase('passportNumber', $event)"></ft-input>
        </div>
      </div>

<!--      <div class="gradient-divider"></div>-->
      <div class="section-header">
        <h4>Contact & Localisation</h4>
      </div>

      <!-- Row 4 (Contact) -->
      <div class="form-row two-cols">
        <div class="field-container">
          <ft-input label="Email" formControlName="email" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            placeholder="exemple@domaine.com" [invalid]="shouldShowError(emailControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Téléphone" formControlName="primaryPhoneNumber" variant="flat" labelPlacement="label-inside"
            [isLabel]="true" placeholder="+212 6XX-XXXXXX" [invalid]="shouldShowError(primaryPhoneNumberControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
      </div>

      <!-- Row 5 (Location) -->
      <div class="form-row three-cols">
        <div class="field-container">
          <ft-input label="Pays" formControlName="country" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            placeholder="Ex: Maroc" [invalid]="shouldShowError(countryControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Ville" formControlName="city" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            placeholder="Ex: Casablanca" [invalid]="shouldShowError(cityControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Code postal" formControlName="postalCode" variant="flat" labelPlacement="label-inside"
            [isLabel]="true" placeholder="Ex: 20600" [invalid]="shouldShowError(postalCodeControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
      </div>

      <!-- Row 6 (Address) -->
      <div class="form-row full-width">
        <div class="field-container">
          <ft-textarea label="Address" formControlName="address" variant="flat" labelPlacement="inside" [isLabel]="true"
            placeholder="Numéro de rue, Appartement, Quartier..." [invalid]="shouldShowError(addressControl)"
            errorMessage="Ce champs n’est pas valide"></ft-textarea>
        </div>
      </div>

<!--      <div class="gradient-divider"></div>-->
      <div class="section-header">
        <h4>Profil Social & Professionnel</h4>
      </div>

      <!-- Row 7 (Status) -->
      <div class="form-row two-cols">
        <div class="field-container">
          <ft-select label="État civil" formControlName="maritalStatus" [options]="maritalStatuses" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Célibataire, Marié(e)..."
            [invalid]="shouldShowError(maritalStatusControl)" errorMessage="Ce champs n’est pas valide"></ft-select>
        </div>
        <div class="field-container">
          <ft-select label="Nationalité" formControlName="nationality" [options]="nationalities" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Ex: Marocaine"
            [invalid]="shouldShowError(nationalityControl)" errorMessage="Ce champs n’est pas valide"></ft-select>
        </div>
      </div>

      <!-- Row 8 (Social) -->
      <div class="form-row two-cols">
        <div class="field-container">
          <ft-select label="Ethnicité" formControlName="ethnicity" [options]="ethnicities" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Saisir l'ethnicité..."
            [invalid]="shouldShowError(ethnicityControl)" errorMessage="Ce champs n’est pas valide"></ft-select>
        </div>
        <div class="field-container">
          <ft-select label="Profession" formControlName="occupation" [options]="professions" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Ex: Ingénieur, Médecin..."
            [invalid]="shouldShowError(occupationControl)" errorMessage="Ce champs n’est pas valide"></ft-select>
        </div>
      </div>

      <!-- Row 9 (Languages) -->
      <div class="form-row full-width">
        <div class="field-container">
          <ft-select label="Langues parlées" formControlName="spokenLanguages" [options]="spokenLanguagesOptions"
            [multiple]="true" variant="flat" labelPlacement="label-inside" [isLabel]="true"
            placeholder="Sélectionner des langues (Ex: Arabe, Français)"></ft-select>
        </div>
      </div>

      <!-- Emergency Contact Section -->
      <div class="section-header">
        <h4>Contact d'urgence</h4>
      </div>

      <!-- Row 10 (Emergency Contact) -->
      <div class="form-row three-cols">
        <div class="field-container">
          <ft-select label="Type de relation" formControlName="emergencyContactType" [options]="emergencyContactTypes"
            variant="flat" labelPlacement="label-inside" [isLabel]="true" placeholder="Père, Mère, Conjoint..."
            [invalid]="shouldShowError(emergencyContactTypeControl)"
            errorMessage="Ce champs n’est pas valide"></ft-select>
        </div>
        <div class="field-container">
          <ft-input label="Nom complet de la relation" formControlName="emergencyContactName" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="Prénom et Nom"
            [invalid]="shouldShowError(emergencyContactNameControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
        <div class="field-container">
          <ft-input label="Téléphone de la relation" formControlName="emergencyContactPhone" variant="flat"
            labelPlacement="label-inside" [isLabel]="true" placeholder="+212 6XX-XXXXXX"
            [invalid]="shouldShowError(emergencyContactPhoneControl)"
            errorMessage="Ce champs n’est pas valide"></ft-input>
        </div>
      </div>
    </div>
  </form>
</div>
