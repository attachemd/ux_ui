<!-- input-showcase.component.html -->
<div class="all-case-container">
  <h1 class="showcase-title">Icon Button All Cases</h1>
  <div class="cases-container">
    <div class="case-row case-row-heading">
      <div class="case-item case-item-heading">

      </div>
      <div class="case-item">
        Flat
      </div>
      <div class="case-item">
        Outlined
      </div>
      <div class="case-item">
        Faded
      </div>
      <div class="case-item">
        Ghost
      </div>


    </div>
    @for (state of states; track state) {
    <div class="case-row">
      <div class="case-item case-item-heading vertical-text">
        {{state}}
      </div>
      @for (variant of variants; track variant) {
      <div class="case-item">
        <ft-icon-button
          [state]="state"
          [isLabel]="isLabel"
          [label]="label"
          [size]="size"
          [color]="color"
          [variant]="variant"
          [radius]="radius"
          [iconClass]="'arrow_right_alt'"
        >
        </ft-icon-button>

      </div>
      }

    </div>
    }


  </div>
</div>
