<button [class]="'button-container ' + size() + ' ' + variant() + ' ' + state() + ' ' + color() + ' ' + radiusClasses()"
  [disabled]="state() === 'disabled'" [type]="type()"
  [attr.popovertarget]="popovertarget()" [attr.popovertargetaction]="popovertargetaction()">
  <div class="icon-wrapper">
    <span class="material-symbols-rounded">{{iconClass()}}</span>
  </div>
</button>
